<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="app-header">
    <h1>Expense & Budget Visualizer</h1>
    <button id="theme-toggle" aria-label="Toggle dark mode">🌙</button>
  </header>

  <section class="balance-section">
    <h2>Total Balance</h2>
    <p id="balance">$0.00</p>
  </section>

  <section class="form-section">
    <h2>Add Transaction</h2>
    <p id="error-msg" role="alert"></p>
    <form id="expense-form" novalidate>
      <label for="item-name">Item Name</label>
      <input type="text" id="item-name" name="item-name" placeholder="e.g. Lunch" />

      <label for="amount">Amount</label>
      <input type="number" id="amount" name="amount" placeholder="e.g. 12.50" min="0.01" step="0.01" />

      <label for="category">Category</label>
      <select id="category" name="category">
        <option value="">-- Select category --</option>
        <option value="Food">Food</option>
        <option value="Transport">Transport</option>
        <option value="Fun">Fun</option>
      </select>

      <button type="submit">Add Transaction</button>
    </form>
  </section>

  <section class="list-section">
    <h2>Transactions</h2>
    <div class="sort-bar">
      <span class="sort-label">Sort by</span>
      <button class="sort-btn active" data-sort="date">Date</button>
      <button class="sort-btn" data-sort="amount">Amount</button>
      <button class="sort-btn" data-sort="category">Category</button>
    </div>
    <ul id="transaction-list"></ul>
  </section>

  <section class="chart-section">
    <h2>Spending by Category</h2>
    <canvas id="chart-canvas"></canvas>
  </section>

  <section class="summary-section">
    <h2>Monthly Summary</h2>
    <div id="monthly-summary"></div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
